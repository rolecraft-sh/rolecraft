name: Release Preparation

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release preparation script
        run: |
          bash .github/scripts/release-prep.sh "${{ github.ref_name }}"

      - name: Create branch and commit
        run: |
          BRANCH_NAME="changelog/${{ github.ref_name }}"
          git checkout -b "$BRANCH_NAME"
          git add CHANGELOG.md package.json
          git commit -m "chore: update changelog and version for ${{ github.ref_name }} [skip ci]"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        run: |
          gh pr create \
            --base main \
            --head "changelog/${{ github.ref_name }}" \
            --title "chore: release ${{ github.ref_name }}" \
            --body "This PR updates the changelog and version for \`${{ github.ref_name }}\`.

## Changes
- Updated CHANGELOG.md with changes since the previous tag
- Updated package.json version to \`${{ github.ref_name }}\`

> Auto-generated by the release-prep workflow."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
