name: Release Preparation

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Check version not already published
        run: |
          if npm view "rolecraft@${{ github.ref_name }}" version >/dev/null 2>&1; then
            echo "ERROR: Version ${{ github.ref_name }} is already published on npm. Aborting release."
            exit 1
          fi
          echo "Version ${{ github.ref_name }} is new. Proceeding with release."

      - name: Set up Git user
        run: |
          git config user.name "Samet ÇELİKBIÇAK"
          git config user.email "sametcelikbicak@outlook.com"

      - name: Import signing key (SSH or GPG)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          if [ -n "$SSH_PRIVATE_KEY" ]; then
            mkdir -p ~/.ssh
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_signing
            chmod 600 ~/.ssh/id_signing
            ssh-keygen -y -f ~/.ssh/id_signing > ~/.ssh/id_signing.pub
            eval "$(ssh-agent -s)" > /dev/null
            ssh-add ~/.ssh/id_signing
            git config gpg.format ssh
            git config user.signingkey ~/.ssh/id_signing.pub
            git config tag.gpgsign true
          elif [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            git config user.signingkey "$GPG_KEY_ID"
            git config tag.gpgsign true
          else
            echo "No signing key configured — tag will not be re-signed"
          fi

      - name: Run release preparation script
        run: |
          bash .github/scripts/release-prep.sh "${{ github.ref_name }}"

      - name: Create branch and commit
        run: |
          BRANCH_NAME="changelog/${{ github.ref_name }}"
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true
          git checkout -b "$BRANCH_NAME"
          git add CHANGELOG.md package.json
          git commit -m "chore: update changelog and version for ${{ github.ref_name }} [skip ci]"
          git push origin "$BRANCH_NAME"

      - name: Update tag to release commit (re-signed)
        run: |
          TAG_NAME="${{ github.ref_name }}"
          TAG_MESSAGE="chore: release $TAG_NAME"
          if git config tag.gpgsign | grep -q true; then
            git tag -f -s "$TAG_NAME" -m "$TAG_MESSAGE"
          else
            git tag -f "$TAG_NAME"
          fi
          git push origin "$TAG_NAME" --force

      - name: Create Pull Request
        run: |
          cat > /tmp/pr-body.md << BODYEOF
          This PR updates the changelog and version for \`${{ github.ref_name }}\`.

          ## Changes
          - Updated CHANGELOG.md with changes since the previous tag
          - Updated package.json version to \`${{ github.ref_name }}\`

          > Auto-generated by the release-prep workflow.
          BODYEOF
          gh pr create \
            --base main \
            --head "changelog/${{ github.ref_name }}" \
            --title "chore: release ${{ github.ref_name }}" \
            --body-file /tmp/pr-body.md
